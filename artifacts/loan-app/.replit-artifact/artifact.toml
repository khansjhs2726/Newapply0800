kind = "web"
previewPath = "/"
title = "Pakistan Loan Assistance Programme"
version = "1.0.0"
id = "artifacts/loan-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19058

[services.development]
run = "pnpm --filter @workspace/loan-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loan-app", "run", "build" ]
publicDir = "artifacts/loan-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19058"
BASE_PATH = "/"
